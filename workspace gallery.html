<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | RRC HIVE Coworkingspace</title>
    <link rel="apple-touch-icon" sizes="180x180" href="src/img/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="src/img/icon/favicon.png">
    <link rel="manifest" href="./site.webmanifest">
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #1B365D;
            --vibrant-blue: #4A90E2;
            --accent-orange: #FDB813;
        }

        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }

        /* Navbar Styling */
        .navbar { background-color: var(--primary-blue); padding: 15px 0; }
        
        /* Gallery Grid Styling */
        .gallery-container { padding: 60px 12px; }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            height: 300px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        /* Hover Overlay Effect */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 48, 91, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        
        .overlay-icon {
            color: white;
            font-size: 2.5rem;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .overlay-icon { transform: translateY(0); }

        /* Category Filter Buttons */
        .filter-btn {
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            font-weight: 600;
            margin: 5px;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--primary-blue);
            color: white;
        }

        footer { background-color: var(--primary-blue); color: white; }
    </style>
</head>
<body>
