    <style>
        :root {
            --primary-blue: #00305b;
            --vibrant-blue: #007bff;
            --accent-orange: #ff6a00;
        }

        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }

        /* Navbar Styling */
        .navbar { background-color: var(--primary-blue); padding: 15px 0; }
        
        /* Gallery Grid Styling */
        .gallery-container { padding: 60px 0; }
        
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            height: 300px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        /* Hover Overlay Effect */
        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 48, 91, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gallery-item:hover img { transform: scale(1.1); }
        .gallery-item:hover .gallery-overlay { opacity: 1; }
        
        .overlay-icon {
            color: white;
            font-size: 2.5rem;
            transform: translateY(20px);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .overlay-icon { transform: translateY(0); }

        /* Category Filter Buttons */
        .filter-btn {
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            font-weight: 600;
            margin: 5px;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background-color: var(--primary-blue);
            color: white;
        }

        footer { background-color: var(--primary-blue); color: white; }
    </style>
</head>
