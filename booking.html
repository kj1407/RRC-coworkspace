<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Booking | RRC HIVE Coworkingspace</title>
    <link rel="apple-touch-icon" sizes="180x180" href="src/img/icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="src/img/icon/favicon.png">
    <link rel="manifest" href="./site.webmanifest">
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #1B365D;
            --accent-orange: #FDB813;
            --light-bg: #f8f9fa;
        }
        body { background-color: var(--light-bg); font-family: 'Segoe UI', sans-serif; }
        .navbar { background-color: var(--primary-blue); }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .form-label { font-weight: 600; color: var(--primary-blue); font-size: 0.85rem; text-transform: uppercase; }
        .btn-warning { background-color: var(--accent-orange) !important; color: white !important; font-weight: bold; border: none; padding: 12px; }
        .summary-box { background-color: white; border-top: 5px solid var(--accent-orange); }
        .price-text { color: var(--accent-orange); font-weight: 800; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-content">
            <div class="spinner"></div>
            <img src="src/img/logo/Logo.png" alt="RRC HIVE" class="loader-logo ">
        </div>
    </div>

    <nav class="navbar navbar-expand navbar-dark sticky-top shadow-sm" style="background-color: var(--primary-blue);">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold" href="./index.html">
                <img src="src/img/logo/Logo.png" alt="RRC Co-Workspace Logo" style="max-height: 50px;" class="d-inline-block align-text-top me-1">
            </a>

            <div class="d-flex align-items-center gap-2 gap-md-3">
                <a class="nav-link text-color-1 small px-2" href="./index.html">
                    <i class="fa-solid fa-house"></i> <span class="d-sm-inline">Home</span>
                </a>
            </div>
        </div>
    </nav>
    <br>
    <div class="container pb-5">
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card p-4 p-md-5">
                    <h3 class="fw-bold mb-4" style="color: var(--primary-blue);">Complete Your Booking</h3>
                    <form id="bookingForm" onsubmit="event.preventDefault();">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Name</label>
                                <input type="text" id="fullName" name="full_name" class="form-control" placeholder="Name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Mobile</label>
                                <input type="tel" id="phoneNum" name="phone" class="form-control" placeholder="+91..." required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email ID</label>
                                <input type="email" id="emailId" name="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Workspace Plan</label>
                                <select class="form-select" name="plan_type" id="planType" onchange="calculateTotal()">
                                    <option value="300" data-unit="Hour">Meeting Room (₹300/hr)</option>
                                    <option value="12000" data-unit="Month">Private Cabin (₹12,000/mo)</option>
                                    <option value="4000" data-unit="Month">Hot Desk (₹4,000/mo)</option>
                                    <option value="5000" data-unit="Month">Dedicated Desk (₹5,000/mo)</option>
                                    <option value="15000" data-unit="Month">Student Desk (₹1,500/mo)</option>
                                    <option value="500" data-unit="Day">Day Pass (₹500/day)</option>
                                </select>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Start Date</label>
                                <input type="date" name="start_date" id="startDate" class="form-control" required onchange="calculateTotal()">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Start Time</label>
                                <input type="time" name="start_time" id="startTime" class="form-control" value="09:00" onchange="calculateTotal()">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">End Time</label>
                                <input type="time" name="end_time" id="endTime" class="form-control" value="18:00" onchange="calculateTotal()">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label" id="durationLabel">Duration (Units)</label>
                                <input type="number" name="duration" id="duration" class="form-control" value="1" min="1" oninput="calculateTotal()">
                            </div>

                            <hr class="my-4">
                            <div class="bg-light p-3 rounded mb-4">
                                <small class="text-muted d-block mb-2">Power Services Available (Optional):</small>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="vOffice">
                                    <label class="form-check-label small" for="vOffice">Virtual Office Address</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="checkbox" id="legal">
                                    <label class="form-check-label small" for="legal">Legal Consultation</label>
                                </div>
                            </div>
                            
                            <div class="col-md-12 mt-4">
                                <button type="button" onclick="sendBookingToWhatsApp()" class="btn btn-color w-100 shadow-sm">
                                    <i class="fab fa-whatsapp me-2"></i> CONFIRM & SEND VIA WHATSAPP
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card summary-box p-4 sticky-top" style="top: 100px;">
                    <h5 class="fw-bold border-bottom pb-3 mb-3" style="color: var(--primary-blue);">Booking Summary</h5>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Selected Plan:</span>
                        <span id="sumPlan" class="fw-bold text-dark">Hot Desk</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Rate:</span>
                        <span id="sumRate" class="fw-bold text-dark">₹4,000</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Booking Period:</span>
                        <span id="sumPeriod" class="fw-bold text-dark">1 Month</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="h5 fw-bold mb-0">Total:</span>
                        <span id="totalAmount" class="price-text">₹4,000</span>
                    </div>
                    <p class="small text-muted text-center mb-0">
                        <i class="fas fa-lock me-1"></i> Secure payment processed via RRC Group
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Set today's date
        document.getElementById('startDate').valueAsDate = new Date();

        function calculateTotal() {
            const planSelect = document.getElementById('planType');
            const selectedOption = planSelect.options[planSelect.selectedIndex];
            
            const rate = parseInt(planSelect.value);
            const unit = selectedOption.getAttribute('data-unit');
            const planName = selectedOption.text.split(' (')[0];
            const duration = parseInt(document.getElementById('duration').value) || 1;

            // Update labels based on unit
            document.getElementById('durationLabel').innerText = `Duration (${unit}s)`;
            
            // Update Summary Card
            document.getElementById('sumPlan').innerText = planName;
            document.getElementById('sumRate').innerText = `₹${rate.toLocaleString()}`;
            document.getElementById('sumPeriod').innerText = `${duration} ${unit}${duration > 1 ? 's' : ''}`;
            
            // Final Calculation
            const total = rate * duration;
            document.getElementById('totalAmount').innerText = `₹${total.toLocaleString()}`;
        }

        // Initial run
        calculateTotal();
    </script>
    <script>
    function sendBookingToWhatsApp() {
        // Collect Personal Info - Corrected IDs
        const name = document.getElementById('fullName').value;
        const phone = document.getElementById('phoneNum').value;
        const email = document.getElementById('emailId').value;
        
        // Collect Plan Info
        const planSelect = document.getElementById('planType');
        const planName = planSelect.options[planSelect.selectedIndex].text;
        const duration = document.getElementById('duration').value;
        const total = document.getElementById('totalAmount').innerText; 
        
        // Collect Optional Services
        const vOffice = document.getElementById('vOffice').checked ? "Yes" : "No";
        const legal = document.getElementById('legal').checked ? "Yes" : "No";

        // Validation
        if (!name || !phone || !email) {
            alert("Please fill in your contact details first.");
            return;
        }

        const myNumber = "918903169940"; 
        
        // Build the Message
        const message = `*New Workspace Booking - RRC*%0A` +
                        `------------------------------%0A` +
                        `*Name:* ${encodeURIComponent(name)}%0A` +
                        `*Phone:* ${encodeURIComponent(phone)}%0A` +
                        `*Email:* ${encodeURIComponent(email)}%0A` +
                        `*Plan:* ${encodeURIComponent(planName)}%0A` +
                        `*Duration:* ${encodeURIComponent(duration)} units%0A` +
                        `*Virtual Office:* ${vOffice}%0A` +
                        `*Legal Consultation:* ${legal}%0A` +
                        `------------------------------%0A` +
                        `*Total Price:* ${encodeURIComponent(total)}`;

        window.open(`https://wa.me/${myNumber}?text=${message}`, '_blank');
    }
    </script>
    <script>
        document.querySelectorAll('img').forEach(img => {
        img.addEventListener('contextmenu', e => e.preventDefault());
    });
    </script>

    <script>
        window.addEventListener('load', function() {
        const preloader = document.getElementById('preloader');
        
        // Add a slight delay (500ms) for a smoother feel
        setTimeout(() => {
            preloader.classList.add('preloader-hidden');
        }, 500);
    });
    </script>

    <script>
        // Function to hide the loader
        function hidePreloader() {
            const preloader = document.getElementById('preloader');
            if (preloader && !preloader.classList.contains('preloader-hidden')) {
                preloader.classList.add('preloader-hidden');
                console.log("Preloader hidden successfully.");
            }
        }

        // 1. Hide when everything is finished loading
        window.addEventListener('load', function() {
            setTimeout(hidePreloader, 3000); // 0.5s smooth delay
        });

        // 2. FAIL-SAFE: If 'load' event doesn't fire, hide it anyway after 3 seconds
        setTimeout(hidePreloader, 5000);
    </script>

</body>
</html>
